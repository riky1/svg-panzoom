<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>svg-panzoom - basic</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .page {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        padding: 12px 16px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .wrap {
        padding: 16px;
        height: 100%;
        box-sizing: border-box;
      }

      .demo {
        height: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        overflow: hidden;
      }

      .btn {
        appearance: none;
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }
      .btn:hover {
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <strong>svg-panzoom basic</strong>
        <button class="btn" id="zoomIn">Zoom In</button>
        <button class="btn" id="zoomOut">Zoom Out</button>
        <button class="btn" id="reset">Reset</button>
        <button class="btn" id="fit">Fit</button>
        <button class="btn" id="center">Center</button>
      </header>

      <div class="wrap">
        <div class="demo" id="demo">
          <svg viewBox="0 0 800 450" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#60a5fa" />
                <stop offset="1" stop-color="#a78bfa" />
              </linearGradient>
            </defs>

            <g data-spz-viewport="true">
              <rect x="0" y="0" width="800" height="450" fill="#0b1220" />
              <rect x="40" y="40" width="720" height="370" rx="24" fill="url(#g)" opacity="0.35" />

              <circle cx="200" cy="220" r="70" fill="#22c55e" opacity="0.85" />
              <circle cx="580" cy="220" r="95" fill="#ef4444" opacity="0.75" />

              <path
                d="M120 340 C 220 120, 460 120, 660 340"
                fill="none"
                stroke="#e5e7eb"
                stroke-width="6"
                opacity="0.9"
              />

              <text x="60" y="100" fill="#e5e7eb" font-size="28">Drag to pan • Wheel to zoom</text>
              <text x="60" y="140" fill="#e5e7eb" opacity="0.8" font-size="18">Uses outer group as viewport</text>
            </g>
          </svg>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
